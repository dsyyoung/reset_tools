name: Node CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run syntax check
        run: npm test

      - name: Validate server startup
        run: |
          node server.js &
          sleep 3
          curl --fail http://127.0.0.1:3000 || exit 1
